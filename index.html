<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Invitaciones con QR</title>
    <!-- Librería QRCode.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ============================================
           ESTILOS GENERALES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* ============================================
           CONTENEDOR PRINCIPAL
           ============================================ */
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* ============================================
           SECCIÓN DE INPUT
           ============================================ */
        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        /* ============================================
           BOTONES
           ============================================ */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-descargar {
            background: #28a745;
            color: white;
        }

        .btn-descargar:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-descargar:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           CANVAS Y PREVISUALIZACIÓN
           ============================================ */
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* ============================================
           MENSAJES Y ESTADOS
           ============================================ */
        .mensaje {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .mensaje.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            display: none;
        }

        /* Contenedor oculto para generar el QR temporalmente */
        #qrcode-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Generador de Invitaciones</h1>
        <p class="subtitle">Crea invitaciones personalizadas con código QR</p>

        <!-- Mensajes de estado -->
        <div id="mensaje" class="mensaje"></div>
        <div id="loading" class="loading">Cargando plantilla...</div>

        <!-- Sección de entrada -->
        <div class="input-section">
            <label for="nombre">Nombre del invitado:</label>
            <input 
                type="text" 
                id="nombre" 
                placeholder="Ej: Juan Pérez"
                autocomplete="off"
            >
        </div>

        <!-- Botones -->
        <div class="buttons">
            <button class="btn-generar" onclick="generarInvitacion()">
                ✨ Generar
            </button>
            <button 
                class="btn-descargar" 
                id="btnDescargar" 
                onclick="descargarInvitacion()"
                disabled
            >
                ⬇️ Descargar
            </button>
        </div>

        <!-- Canvas para la invitación -->
        <div class="canvas-container">
            <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <!-- Contenedor oculto para generar QR -->
    <div id="qrcode-hidden"></div>

    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nombreInput = document.getElementById('nombre');
        const mensajeDiv = document.getElementById('mensaje');
        const loadingDiv = document.getElementById('loading');
        const btnDescargar = document.getElementById('btnDescargar');
        const qrHiddenDiv = document.getElementById('qrcode-hidden');

        // Cargar la imagen de plantilla
        const plantilla = new Image();
        plantilla.crossOrigin = 'anonymous';
        
        // Variable para controlar si la plantilla cargó correctamente
        let plantillaCargada = false;

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        // Mostrar mensaje de carga
        loadingDiv.style.display = 'block';

        // Intentar cargar la plantilla
        plantilla.src = 'plantilla.png';

        // Cuando la plantilla se carga correctamente
        plantilla.onload = function() {
            plantillaCargada = true;
            loadingDiv.style.display = 'none';
            mostrarMensaje('Plantilla cargada correctamente. ¡Listo para generar invitaciones!', 'info');
            
            // Dibujar plantilla inicial vacía (sin nombre ni QR)
            dibujarPlantillaBase();
        };

        // Si hay error al cargar la plantilla
        plantilla.onerror = function() {
            loadingDiv.style.display = 'none';
            mostrarMensaje('⚠️ No se encontró "plantilla.png". Se usará un fondo predeterminado.', 'error');
            
            // Dibujar fondo predeterminado
            dibujarFondoPredeterminado();
        };

        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================

        /**
         * Dibuja solo la plantilla base (sin nombre ni QR)
         */
        function dibujarPlantillaBase() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (plantillaCargada) {
                // Dibujar la plantilla ajustada al canvas
                ctx.drawImage(plantilla, 0, 0, canvas.width, canvas.height);
            } else {
                dibujarFondoPredeterminado();
            }
        }

        /**
         * Dibuja un fondo predeterminado si no hay plantilla
         */
        function dibujarFondoPredeterminado() {
            // Fondo degradado elegante
            const gradiente = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradiente.addColorStop(0, '#667eea');
            gradiente.addColorStop(0.5, '#764ba2');
            gradiente.addColorStop(1, '#f093fb');
            
            ctx.fillStyle = gradiente;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decoración: círculos decorativos
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(100, 200, 150, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(980, 1700, 200, 0, Math.PI * 2);
            ctx.fill();

            // Título decorativo
            ctx.font = 'bold 80px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText('INVITACIÓN', canvas.width / 2, 300);
            
            // Línea decorativa
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(340, 330);
            ctx.lineTo(740, 330);
            ctx.stroke();
        }

        /**
         * Genera la invitación completa con nombre y QR
         */
        async function generarInvitacion() {
            // Obtener y limpiar el nombre
            let nombre = nombreInput.value.trim();
            
            // Validar que haya un nombre
            if (!nombre) {
                mostrarMensaje('⚠️ Por favor, ingresa un nombre.', 'error');
                nombreInput.focus();
                return;
            }

            // Limpiar el nombre: minúsculas y sin espacios extra
            const nombreLimpio = nombre.toLowerCase().replace(/\s+/g, ' ').trim();
            
            // Limpiar mensajes previos
            mensajeDiv.style.display = 'none';

            try {
                // 1. Dibujar la plantilla base
                dibujarPlantillaBase();

                // 2. Generar el código QR
                const qrDataUrl = await generarQR(nombreLimpio);

                // 3. Dibujar el nombre en la parte superior
                dibujarNombre(nombre);

                // 4. Dibujar el QR centrado en la zona media-inferior
                await dibujarQR(qrDataUrl);

                // 5. Habilitar botón de descarga
                btnDescargar.disabled = false;

                mostrarMensaje('✅ Invitación generada correctamente.', 'info');

            } catch (error) {
                console.error('Error al generar invitación:', error);
                mostrarMensaje('❌ Error al generar la invitación. Intenta de nuevo.', 'error');
            }
        }

        /**
         * Genera un código QR y devuelve su Data URL
         */
        function generarQR(texto) {
            return new Promise((resolve, reject) => {
                // Limpiar el contenedor oculto
                qrHiddenDiv.innerHTML = '';

                // Crear nueva instancia de QRCode
                const qr = new QRCode(qrHiddenDiv, {
                    text: texto,
                    width: 400,
                    height: 400,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H // Alta corrección de errores
                });

                // Esperar a que el QR se genere
                setTimeout(() => {
                    const qrImg = qrHiddenDiv.querySelector('img');
                    if (qrImg && qrImg.src) {
                        resolve(qrImg.src);
                    } else {
                        reject(new Error('No se pudo generar el QR'));
                    }
                }, 100);
            });
        }

        /**
         * Dibuja el nombre en el canvas con efecto de sombra para legibilidad
         */
        function dibujarNombre(nombre) {
            const centerX = canvas.width / 2;
            const posY = 500; // Posición vertical del nombre

            // Configurar fuente
            ctx.font = 'bold 90px Arial, sans-serif';
            ctx.textAlign = 'center';

            // Efecto de sombra para mejor legibilidad sobre cualquier fondo
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;

            // Borde/blur adicional (dibuja el texto varias veces para grosor)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillText(nombre, centerX + 4, posY + 4);

            // Texto principal en blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillText(nombre, centerX, posY);

            // Resetear sombra
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        /**
         * Dibuja el código QR en el canvas centrado
         */
        async function dibujarQR(qrDataUrl) {
            return new Promise((resolve, reject) => {
                const qrImg = new Image();
                qrImg.crossOrigin = 'anonymous';
                
                qrImg.onload = function() {
                    // Tamaño del QR en el canvas
                    const qrSize = 500;
                    
                    // Posición centrada horizontalmente
                    const centerX = (canvas.width - qrSize) / 2;
                    
                    // Posición vertical: zona media-inferior (aproximadamente 60% del alto)
                    const posY = canvas.height * 0.55;

                    // Fondo blanco para el QR (mejor contraste)
                    const padding = 30;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(
                        centerX - padding, 
                        posY - padding, 
                        qrSize + (padding * 2), 
                        qrSize + (padding * 2)
                    );

                    // Borde sutil alrededor del QR
                    ctx.strokeStyle = '#dddddd';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(
                        centerX - padding, 
                        posY - padding, 
                        qrSize + (padding * 2), 
                        qrSize + (padding * 2)
                    );

                    // Dibujar el QR
                    ctx.drawImage(qrImg, centerX, posY, qrSize, qrSize);

                    // Texto indicativo debajo del QR
                    ctx.font = '40px Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                    ctx.shadowBlur = 10;
                    ctx.fillText('Escanea para verificar', canvas.width / 2, posY + qrSize + 80);
                    
                    // Resetear sombra
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;

                    resolve();
                };

                qrImg.onerror = function() {
                    reject(new Error('Error al cargar la imagen del QR'));
                };

                qrImg.src = qrDataUrl;
            });
        }

        /**
         * Descarga la invitación como imagen PNG
         */
        function descargarInvitacion() {
            try {
                // Crear enlace de descarga
                const link = document.createElement('a');
                
                // Obtener el nombre del invitado para el nombre del archivo
                const nombre = nombreInput.value.trim() || 'invitacion';
                const nombreArchivo = nombre.toLowerCase().replace(/\s+/g, '_');
                
                link.download = `invitacion_${nombreArchivo}.png`;
                link.href = canvas.toDataURL('image/png');
                
                // Simular clic para descargar
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                mostrarMensaje('✅ Invitación descargada correctamente.', 'info');

            } catch (error) {
                console.error('Error al descargar:', error);
                mostrarMensaje('❌ Error al descargar la imagen.', 'error');
            }
        }

        /**
         * Muestra un mensaje al usuario
         */
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'mensaje ' + tipo;
            
            // Auto-ocultar mensajes de éxito después de 3 segundos
            if (tipo === 'info') {
                setTimeout(() => {
                    mensajeDiv.style.display = 'none';
                }, 3000);
            }
        }

        // ============================================
        // EVENTOS ADICIONALES
        // ============================================

        // Permitir generar con la tecla Enter
        nombreInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                generarInvitacion();
            }
        });
    </script>
</body>
</html>
