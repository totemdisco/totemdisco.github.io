<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Invitaciones con QR</title>
    <!-- Librería QR moderna -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            width: 100%;
            border: 1px solid #333;
        }

        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .input-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            background: #0a0a0a;
            color: #fff;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-generar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-descargar {
            background: #28a745;
            color: white;
        }

        .btn-descargar:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            margin-top: 15px;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 10px;
            border: 1px solid #333;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        .mensaje {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            display: none;
        }

        .mensaje.error {
            background: rgba(248, 215, 218, 0.1);
            color: #f5a0a8;
            border: 1px solid rgba(248, 215, 218, 0.3);
            display: block;
        }

        .mensaje.info {
            background: rgba(209, 236, 241, 0.1);
            color: #8ecae6;
            border: 1px solid rgba(209, 236, 241, 0.3);
            display: block;
        }

        .loading {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            display: none;
            padding: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #444;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #qrcode-hidden {
            position: absolute;
            left: -9999px;
            top: -9999px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generador de Invitaciones</h1>
        <p class="subtitle">Crea invitaciones con código QR</p>

        <div id="mensaje" class="mensaje"></div>
        <div id="loading" class="loading">
            <span class="spinner"></span>Cargando plantilla...
        </div>

        <div class="input-section">
            <label for="nombre">Nombre del invitado:</label>
            <input 
                type="text" 
                id="nombre" 
                placeholder="Ej: Juan Pérez"
                autocomplete="off"
                inputmode="text"
            >
        </div>

        <div class="buttons">
            <button class="btn-generar" id="btnGenerar">
                Generar
            </button>
            <button 
                class="btn-descargar" 
                id="btnDescargar" 
                disabled
            >
                Descargar
            </button>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <div id="qrcode-hidden"></div>

    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        // Tamaño del canvas (más pequeño para mejor compatibilidad con móviles)
        const CANVAS_WIDTH = 540;
        const CANVAS_HEIGHT = 960;
        
        // ============================================
        // ELEMENTOS DOM
        // ============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nombreInput = document.getElementById('nombre');
        const mensajeDiv = document.getElementById('mensaje');
        const loadingDiv = document.getElementById('loading');
        const btnGenerar = document.getElementById('btnGenerar');
        const btnDescargar = document.getElementById('btnDescargar');
        const qrHiddenDiv = document.getElementById('qrcode-hidden');

        // Configurar tamaño del canvas
        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        // ============================================
        // VARIABLES
        // ============================================
        let plantillaCargada = false;
        let plantilla = null;
        let invitacionGenerada = false;

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        function init() {
            loadingDiv.style.display = 'block';
            
            // Intentar cargar la plantilla
            cargarPlantilla();
            
            // Configurar eventos
            btnGenerar.addEventListener('click', generarInvitacion);
            btnDescargar.addEventListener('click', descargarInvitacion);
            
            nombreInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generarInvitacion();
                }
            });
        }

        // ============================================
        // CARGAR PLANTILLA
        // ============================================
        function cargarPlantilla() {
            plantilla = new Image();
            
            plantilla.onload = function() {
                plantillaCargada = true;
                loadingDiv.style.display = 'none';
                mostrarMensaje('Plantilla cargada. ¡Listo!', 'info');
                dibujarPlantillaBase();
            };
            
            plantilla.onerror = function() {
                loadingDiv.style.display = 'none';
                plantillaCargada = false;
                mostrarMensaje('No se encontró plantilla.png. Usando fondo alternativo.', 'error');
                dibujarFondoPredeterminado();
            };
            
            // Agregar timestamp para evitar caché
            plantilla.src = 'plantilla.png?' + Date.now();
        }

        // ============================================
        // DIBUJAR PLANTILLA BASE
        // ============================================
        function dibujarPlantillaBase() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (plantillaCargada && plantilla) {
                ctx.drawImage(plantilla, 0, 0, canvas.width, canvas.height);
            } else {
                dibujarFondoPredeterminado();
            }
        }

        // ============================================
        // FONDO PREDETERMINADO
        // ============================================
        function dibujarFondoPredeterminado() {
            // Fondo degradado
            const gradiente = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradiente.addColorStop(0, '#667eea');
            gradiente.addColorStop(0.5, '#764ba2');
            gradiente.addColorStop(1, '#f093fb');
            
            ctx.fillStyle = gradiente;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decoración
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(50, 100, 75, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(490, 850, 100, 0, Math.PI * 2);
            ctx.fill();

            // Título
            ctx.font = 'bold 40px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText('INVITACIÓN', canvas.width / 2, 150);
            
            // Línea decorativa
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(170, 165);
            ctx.lineTo(370, 165);
            ctx.stroke();
        }

        // ============================================
        // GENERAR INVITACIÓN
        // ============================================
        async function generarInvitacion() {
            const nombre = nombreInput.value.trim();
            
            if (!nombre) {
                mostrarMensaje('Por favor, ingresa un nombre.', 'error');
                nombreInput.focus();
                return;
            }

            btnGenerar.disabled = true;
            btnGenerar.textContent = 'Generando...';
            
            try {
                // Limpiar mensajes
                mensajeDiv.style.display = 'none';
                
                // 1. Dibujar plantilla
                dibujarPlantillaBase();
                
                // 2. Generar QR
                const nombreLimpio = nombre.toLowerCase().replace(/\s+/g, ' ').trim();
                const qrDataUrl = await generarQR(nombreLimpio);
                
                // 3. Dibujar nombre
                dibujarNombre(nombre);
                
                // 4. Dibujar QR
                await dibujarQR(qrDataUrl);
                
                // 5. Habilitar descarga
                btnDescargar.disabled = false;
                invitacionGenerada = true;
                
                mostrarMensaje('Invitación generada correctamente.', 'info');
                
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error al generar. Intenta de nuevo.', 'error');
            } finally {
                btnGenerar.disabled = false;
                btnGenerar.textContent = 'Generar';
            }
        }

        // ============================================
        // GENERAR QR (compatible con móviles)
        // ============================================
        function generarQR(texto) {
            return new Promise((resolve, reject) => {
                try {
                    // Usar la librería qrcode moderna
                    QRCode.toDataURL(texto, {
                        width: 300,
                        height: 300,
                        margin: 2,
                        color: {
                            dark: '#000000',
                            light: '#ffffff'
                        },
                        errorCorrectionLevel: 'H'
                    }, function(err, url) {
                        if (err) {
                            reject(err);
                        } else {
                            resolve(url);
                        }
                    });
                } catch (e) {
                    reject(e);
                }
            });
        }

        // ============================================
        // DIBUJAR NOMBRE
        // ============================================
        function dibujarNombre(nombre) {
            const centerX = canvas.width / 2;
            const posY = 250;

            ctx.font = 'bold 45px Arial, sans-serif';
            ctx.textAlign = 'center';

            // Sombra para legibilidad
            ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // Borde
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillText(nombre, centerX + 2, posY + 2);

            // Texto principal
            ctx.fillStyle = '#ffffff';
            ctx.fillText(nombre, centerX, posY);

            // Resetear sombra
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // ============================================
        // DIBUJAR QR EN CANVAS
        // ============================================
        function dibujarQR(qrDataUrl) {
            return new Promise((resolve, reject) => {
                const qrImg = new Image();
                
                qrImg.onload = function() {
                    const qrSize = 250;
                    const centerX = (canvas.width - qrSize) / 2;
                    const posY = canvas.height * 0.52;

                    // Fondo blanco con padding
                    const padding = 15;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(
                        centerX - padding, 
                        posY - padding, 
                        qrSize + (padding * 2), 
                        qrSize + (padding * 2)
                    );

                    // Borde
                    ctx.strokeStyle = '#dddddd';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(
                        centerX - padding, 
                        posY - padding, 
                        qrSize + (padding * 2), 
                        qrSize + (padding * 2)
                    );

                    // Dibujar QR
                    ctx.drawImage(qrImg, centerX, posY, qrSize, qrSize);

                    // Texto indicativo
                    ctx.font = '20px Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                    ctx.shadowBlur = 5;
                    ctx.fillText('Escanea para verificar', canvas.width / 2, posY + qrSize + 45);
                    
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;

                    resolve();
                };

                qrImg.onerror = function() {
                    reject(new Error('Error al cargar QR'));
                };

                qrImg.src = qrDataUrl;
            });
        }

        // ============================================
        // DESCARGAR (compatible con Android)
        // ============================================
        function descargarInvitacion() {
            if (!invitacionGenerada) return;
            
            try {
                const nombre = nombreInput.value.trim() || 'invitacion';
                const nombreArchivo = 'invitacion_' + nombre.toLowerCase().replace(/\s+/g, '_') + '.png';
                
                // Crear enlace de descarga
                const link = document.createElement('a');
                link.download = nombreArchivo;
                
                // Obtener data URL del canvas
                const dataUrl = canvas.toDataURL('image/png');
                link.href = dataUrl;
                
                // Para Android: abrir en nueva ventana si la descarga no funciona
                link.target = '_blank';
                
                // Agregar al DOM y hacer clic
                document.body.appendChild(link);
                
                // Pequeño delay para asegurar que el enlace esté listo
                setTimeout(() => {
                    link.click();
                    document.body.removeChild(link);
                    mostrarMensaje('Imagen guardada.', 'info');
                }, 100);
                
            } catch (error) {
                console.error('Error al descargar:', error);
                
                // Fallback: mostrar imagen para guardar manualmente
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    const ventana = window.open();
                    ventana.document.write('<html><head><title>Guardar Invitación</title></head><body style="margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#000;"><img src="' + dataUrl + '" style="max-width:100%;height:auto;"><p style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;background:rgba(0,0,0,0.8);padding:15px 25px;border-radius:10px;font-family:sans-serif;">Mantén presionada la imagen para guardarla</p></body></html>');
                    mostrarMensaje('Mantén presionada la imagen para guardarla.', 'info');
                } catch (e) {
                    mostrarMensaje('Error al descargar. Intenta de nuevo.', 'error');
                }
            }
        }

        // ============================================
        // MOSTRAR MENSAJE
        // ============================================
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'mensaje ' + tipo;
            
            if (tipo === 'info') {
                setTimeout(() => {
                    mensajeDiv.style.display = 'none';
                }, 3000);
            }
        }

        // ============================================
        // INICIAR
        // ============================================
        // Esperar a que el DOM esté listo
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
