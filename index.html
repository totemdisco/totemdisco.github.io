<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Invitaciones con QR</title>
    <!-- Librería QRCode.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ============================================
           ESTILOS GENERALES
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================
           CONTENEDOR PRINCIPAL
           ============================================ */
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        /* ============================================
           SECCIÓN DE INPUT
           ============================================ */
        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        /* ============================================
           BOTONES
           ============================================ */
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
        }

        .btn-generar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-generar:active {
            transform: translateY(0);
        }

        .btn-descargar {
            background: #28a745;
            color: white;
        }

        .btn-descargar:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-descargar:active {
            transform: translateY(0);
        }

        .btn-descargar:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           CANVAS Y PREVISUALIZACIÓN
           ============================================ */
        .canvas-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* ============================================
           MENSAJES Y ESTADOS
           ============================================ */
        .mensaje {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .mensaje.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .mensaje.info {
            background: #d1ecf1;
            color: #0c5460;
            display: block;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
            display: none;
        }

        /* Contenedor oculto para generar el QR temporalmente */
        #qrcode-hidden {
            position: absolute;
            left: -9999px;
            top: -9999px;
            opacity: 0;
            pointer-events: none;
        }

        /* Modal para mostrar imagen en Android */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 10px;
        }

        .modal-text {
            color: white;
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Generador de Invitaciones</h1>
        <p class="subtitle">Totem Disco</p>

        <!-- Mensajes de estado -->
        <div id="mensaje" class="mensaje"></div>
        <div id="loading" class="loading">Cargando plantilla...</div>

        <!-- Sección de entrada -->
        <div class="input-section">
            <label for="nombre">Nombre del invitado:</label>
            <input 
                type="text" 
                id="nombre" 
                placeholder="Ej: Juan Pérez"
                autocomplete="off"
            >
        </div>

        <!-- Botones -->
        <div class="buttons">
            <button class="btn-generar" onclick="generarInvitacion()">
                Generar
            </button>
            <button 
                class="btn-descargar" 
                id="btnDescargar" 
                onclick="descargarInvitacion()"
                disabled
            >
                Descargar
            </button>
        </div>

        <!-- Canvas para la invitación -->
        <div class="canvas-container">
            <canvas id="canvas" width="1080" height="1920"></canvas>
        </div>
    </div>

    <!-- Contenedor oculto para generar QR -->
    <div id="qrcode-hidden"></div>

    <!-- Modal para Android -->
    <div id="modal" class="modal">
        <button class="modal-close" onclick="cerrarModal()">×</button>
        <img id="modal-img" src="" alt="Invitación">
        <p class="modal-text">Mantén presionada la imagen para guardarla</p>
    </div>

    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const nombreInput = document.getElementById('nombre');
        const mensajeDiv = document.getElementById('mensaje');
        const loadingDiv = document.getElementById('loading');
        const btnDescargar = document.getElementById('btnDescargar');
        const qrHiddenDiv = document.getElementById('qrcode-hidden');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');

        // Detectar si es Android
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPad|iPhone|iPod/i.test(navigator.userAgent);
        const isMobile = isAndroid || isIOS;

        // Cargar la imagen de plantilla
        const plantilla = new Image();
        
        // Variable para controlar si la plantilla cargó correctamente
        let plantillaCargada = false;
        let invitacionGenerada = false;

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        // Mostrar mensaje de carga
        loadingDiv.style.display = 'block';

        // Intentar cargar la plantilla (sin CORS para evitar problemas en Android)
        plantilla.onload = function() {
            plantillaCargada = true;
            loadingDiv.style.display = 'none';
            mostrarMensaje('Plantilla cargada correctamente. ¡Listo para generar invitaciones!', 'info');
            
            // Dibujar plantilla inicial vacía (sin nombre ni QR)
            dibujarPlantillaBase();
        };

        plantilla.onerror = function() {
            loadingDiv.style.display = 'none';
            mostrarMensaje('⚠️ No se encontró "plantilla.png". Se usará un fondo predeterminado.', 'error');
            
            // Dibujar fondo predeterminado
            dibujarFondoPredeterminado();
        };

        // Cargar la plantilla
        plantilla.src = 'plantilla.png';

        // ============================================
        // FUNCIONES PRINCIPALES
        // ============================================

        /**
         * Dibuja solo la plantilla base (sin nombre ni QR)
         */
        function dibujarPlantillaBase() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (plantillaCargada) {
                // Dibujar la plantilla ajustada al canvas
                ctx.drawImage(plantilla, 0, 0, canvas.width, canvas.height);
            } else {
                dibujarFondoPredeterminado();
            }
        }

        /**
         * Dibuja un fondo predeterminado si no hay plantilla
         */
        function dibujarFondoPredeterminado() {
            // Fondo degradado elegante
            const gradiente = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradiente.addColorStop(0, '#667eea');
            gradiente.addColorStop(0.5, '#764ba2');
            gradiente.addColorStop(1, '#f093fb');
            
            ctx.fillStyle = gradiente;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Decoración: círculos decorativos
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(100, 200, 150, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(980, 1700, 200, 0, Math.PI * 2);
            ctx.fill();

            // Título decorativo
            ctx.font = 'bold 80px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = 'white';
            ctx.fillText('INVITACIÓN', canvas.width / 2, 300);
            
            // Línea decorativa
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(340, 330);
            ctx.lineTo(740, 330);
            ctx.stroke();
        }

        /**
         * Genera la invitación completa con nombre y QR
         */
        async function generarInvitacion() {
            // Obtener y limpiar el nombre
            let nombre = nombreInput.value.trim();
            
            // Validar que haya un nombre
            if (!nombre) {
                mostrarMensaje('⚠️ Por favor, ingresa un nombre.', 'error');
                nombreInput.focus();
                return;
            }

            // Limpiar el nombre: minúsculas y sin espacios extra
            const nombreLimpio = nombre.toLowerCase().replace(/\s+/g, ' ').trim();
            
            // Limpiar mensajes previos
            mensajeDiv.style.display = 'none';

            try {
                // 1. Dibujar la plantilla base
                dibujarPlantillaBase();

                // 2. Generar el código QR
                const qrDataUrl = await generarQR(nombreLimpio);

                // 3. Dibujar el nombre en la parte superior
                dibujarNombre(nombre);

                // 4. Dibujar el QR centrado en la zona media-inferior
                await dibujarQR(qrDataUrl);

                // 5. Habilitar botón de descarga
                btnDescargar.disabled = false;
                invitacionGenerada = true;

                mostrarMensaje('✅ Invitación generada correctamente.', 'info');

            } catch (error) {
                console.error('Error al generar invitación:', error);
                mostrarMensaje('❌ Error al generar la invitación: ' + error.message, 'error');
            }
        }

        /**
         * Genera un código QR y devuelve su Data URL
         * Versión mejorada compatible con Android
         */
        function generarQR(texto) {
            return new Promise((resolve, reject) => {
                try {
                    // Limpiar el contenedor oculto
                    qrHiddenDiv.innerHTML = '';

                    // Crear nueva instancia de QRCode
                    const qr = new QRCode(qrHiddenDiv, {
                        text: texto,
                        width: 400,
                        height: 400,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    // Esperar a que el QR se genere (más tiempo para Android)
                    setTimeout(() => {
                        try {
                            const qrImg = qrHiddenDiv.querySelector('img');
                            const qrCanvas = qrHiddenDiv.querySelector('canvas');
                            
                            if (qrImg && qrImg.src && qrImg.src.startsWith('data:')) {
                                resolve(qrImg.src);
                            } else if (qrCanvas) {
                                // Si hay canvas, convertirlo a data URL
                                resolve(qrCanvas.toDataURL('image/png'));
                            } else {
                                // Intentar obtener de otra forma
                                const imgElement = qrHiddenDiv.getElementsByTagName('img')[0];
                                if (imgElement && imgElement.src) {
                                    resolve(imgElement.src);
                                } else {
                                    reject(new Error('No se pudo generar el QR - formato no soportado'));
                                }
                            }
                        } catch (e) {
                            reject(new Error('Error al obtener QR: ' + e.message));
                        }
                    }, isAndroid ? 300 : 100);

                } catch (error) {
                    reject(new Error('Error al crear QR: ' + error.message));
                }
            });
        }

        /**
         * Dibuja el nombre en el canvas con efecto de sombra para legibilidad
         */
        function dibujarNombre(nombre) {
            const centerX = canvas.width / 2;
            const posY = 500; // Posición vertical del nombre

            // Configurar fuente
            ctx.font = 'bold 90px Arial, sans-serif';
            ctx.textAlign = 'center';

            // Efecto de sombra para mejor legibilidad sobre cualquier fondo
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;

            // Borde/blur adicional (dibuja el texto varias veces para grosor)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillText(nombre, centerX + 4, posY + 4);

            // Texto principal en blanco
            ctx.fillStyle = '#ffffff';
            ctx.fillText(nombre, centerX, posY);

            // Resetear sombra
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        /**
         * Dibuja el código QR en el canvas centrado
         */
        async function dibujarQR(qrDataUrl) {
            return new Promise((resolve, reject) => {
                const qrImg = new Image();
                
                qrImg.onload = function() {
                    try {
                        // Tamaño del QR en el canvas
                        const qrSize = 500;
                        
                        // Posición centrada horizontalmente
                        const centerX = (canvas.width - qrSize) / 2;
                        
                        // Posición vertical: zona media-inferior (aproximadamente 60% del alto)
                        const posY = canvas.height * 0.55;

                        // Fondo blanco para el QR (mejor contraste)
                        const padding = 30;
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(
                            centerX - padding, 
                            posY - padding, 
                            qrSize + (padding * 2), 
                            qrSize + (padding * 2)
                        );

                        // Borde sutil alrededor del QR
                        ctx.strokeStyle = '#dddddd';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(
                            centerX - padding, 
                            posY - padding, 
                            qrSize + (padding * 2), 
                            qrSize + (padding * 2)
                        );

                        // Dibujar el QR
                        ctx.drawImage(qrImg, centerX, posY, qrSize, qrSize);

                        // Texto indicativo debajo del QR
                        ctx.font = '40px Arial, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = '#ffffff';
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
                        ctx.shadowBlur = 10;
                        ctx.fillText('Escanea para verificar', canvas.width / 2, posY + qrSize + 80);
                        
                        // Resetear sombra
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;

                        resolve();
                    } catch (e) {
                        reject(new Error('Error al dibujar QR: ' + e.message));
                    }
                };

                qrImg.onerror = function() {
                    reject(new Error('Error al cargar la imagen del QR'));
                };

                qrImg.src = qrDataUrl;
            });
        }

        /**
         * Descarga la invitación como imagen PNG
         * Versión mejorada compatible con Android
         */
        function descargarInvitacion() {
            if (!invitacionGenerada) {
                mostrarMensaje('⚠️ Primero genera una invitación.', 'error');
                return;
            }

            try {
                // Obtener el nombre del invitado para el nombre del archivo
                const nombre = nombreInput.value.trim() || 'invitacion';
                const nombreArchivo = 'invitacion_' + nombre.toLowerCase().replace(/\s+/g, '_') + '.png';
                
                // Convertir canvas a blob para mejor compatibilidad
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        mostrarMensaje('❌ Error al generar la imagen.', 'error');
                        return;
                    }

                    const url = URL.createObjectURL(blob);

                    // En Android, mostrar modal con la imagen para que pueda guardarla manualmente
                    if (isAndroid) {
                        mostrarModal(url);
                        mostrarMensaje('📱 Mantén presionada la imagen para guardarla', 'info');
                        return;
                    }

                    // Para otros dispositivos, descarga normal
                    const link = document.createElement('a');
                    link.download = nombreArchivo;
                    link.href = url;
                    link.style.display = 'none';
                    
                    document.body.appendChild(link);
                    
                    // Usar setTimeout para asegurar que el click se registre
                    setTimeout(function() {
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                        mostrarMensaje('✅ Invitación descargada correctamente.', 'info');
                    }, 100);

                }, 'image/png');

            } catch (error) {
                console.error('Error al descargar:', error);
                mostrarMensaje('❌ Error al descargar: ' + error.message, 'error');
            }
        }

        /**
         * Muestra el modal con la imagen (para Android)
         */
        function mostrarModal(url) {
            modalImg.src = url;
            modal.classList.add('active');
            
            // Guardar referencia para liberar después
            modalImg.dataset.blobUrl = url;
        }

        /**
         * Cierra el modal
         */
        function cerrarModal() {
            modal.classList.remove('active');
            
            // Liberar el blob URL
            if (modalImg.dataset.blobUrl) {
                URL.revokeObjectURL(modalImg.dataset.blobUrl);
                modalImg.dataset.blobUrl = '';
            }
        }

        /**
         * Muestra un mensaje al usuario
         */
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = 'mensaje ' + tipo;
            
            // Auto-ocultar mensajes de éxito después de 3 segundos
            if (tipo === 'info') {
                setTimeout(function() {
                    mensajeDiv.style.display = 'none';
                }, 3000);
            }
        }

        // ============================================
        // EVENTOS ADICIONALES
        // ============================================

        // Permitir generar con la tecla Enter
        nombreInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                generarInvitacion();
            }
        });

        // Cerrar modal al hacer clic fuera de la imagen
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                cerrarModal();
            }
        });
    </script>
</body>
</html>
